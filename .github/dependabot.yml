version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies]
  - package-ecosystem: npm
    directory: /oauth-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, worker]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
