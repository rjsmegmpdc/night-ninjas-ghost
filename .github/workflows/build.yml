name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_glob: 'dist-electron/*.exe'
            artifact_name: velocity-windows
          - os: macos-latest
            platform: mac
            artifact_glob: 'dist-electron/*.dmg'
            artifact_name: velocity-macos

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force
        env:
          npm_config_arch: x64

      - name: Build desktop installer
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a release when triggered by a version tag
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: velocity-windows
          path: release-artifacts/

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: velocity-macos
          path: release-artifacts/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          draft: true
          generate_release_notes: true
          name: 'VELOCITY ${{ github.ref_name }}'
