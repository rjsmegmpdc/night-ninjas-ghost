name: Deploy PWA to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # Hard gate — react-hooks/rules-of-hooks (see eslint.config.mjs).
      # Added after the /setup React #310 incident: a hook below an early
      # return shipped to prod and crashed every connected user.
      - name: Lint (rules of hooks)
        run: npm run lint

      - name: Run pure-function tests
        run: npm test

      - name: Build PWA
        run: npm run build
        env:
          VITE_STRAVA_OAUTH_WORKER: ${{ secrets.STRAVA_OAUTH_WORKER_URL }}
          # When STRAVA_CLIENT_ID is set as a GitHub secret, it is baked into
          # the build and all visitors connect via the shared Night Ninjas app
          # registration (10-athlete pilot cohort). When absent, the BYOK
          # wizard shows and each user registers their own Strava API app.
          VITE_STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=night-ninjas-ghost --branch=main
