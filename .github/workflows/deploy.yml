name: Deploy PWA to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run pure-function tests
        run: npm test

      - name: Build PWA
        run: npm run build
        env:
          VITE_STRAVA_OAUTH_WORKER: ${{ secrets.STRAVA_OAUTH_WORKER_URL }}
          # VITE_STRAVA_CLIENT_ID deliberately NOT set: a baked-in client ID
          # points every visitor at ONE Strava API app, and Strava caps an
          # unapproved app at a single connected athlete — locking the app to
          # the owner. Without it, each athlete gets the guided Setup wizard
          # and connects via their own free API app (see docs/ONBOARDING.md).

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=night-ninjas-ghost --branch=main
